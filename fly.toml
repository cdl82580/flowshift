app = "flowshift-cdl"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  DATABASE_PATH = "/data/flowshift.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "flowshift_data"
  destination = "/data"
  initial_size = "1gb"
